<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - GamerZone</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #2352af; /* Azul base del sitio */
      --surface: #ffffff;
      --surface-2: #f0f3f9; /* Gris claro base del sitio */
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.05);
      --accent: #8b5cf6; /* Morado de la sección "Mi Perfil" */
      --accent-soft: rgba(139, 92, 246, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      width: 100%;
      max-width: 440px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 40px 32px;
      display: grid;
      gap: 24px;
    }
    .header-zone {
      text-align: center;
      display: grid;
      gap: 8px;
    }
    h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .form-group {
      display: grid;
      gap: 8px;
    }
    label {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 1rem;
      background: var(--surface-2);
      color: var(--text);
      transition: all 0.2s ease;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }
    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.88rem;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .remember-me input {
      width: auto;
      cursor: pointer;
    }
    .forgot-pass {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .forgot-pass:hover {
      text-decoration: underline;
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .submit-btn:hover { 
      background: #7c3aed; /* Un tono más oscuro del morado de perfil */
    }
    .submit-btn:active {
      transform: scale(0.98);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      border-radius: 10px;
      background: var(--surface-2);
      text-decoration: none;
      font-weight: 600;
      color: var(--text);
      transition: all 0.2s ease;
      text-align: center;
      margin-top: 8px;
    }
    .back-link:hover {
      background: var(--accent-soft);
      color: var(--accent);
      transform: translateX(-4px);
    }
    .register-prompt {
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .register-prompt a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .register-prompt a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <main class="panel">
      <header class="header-zone">
        <h1>GamerZone</h1>
        <p>Inicia sesión para acceder a tu perfil y carrito</p>
      </header>

      <form action="../../index.html" method="POST" style="display: grid; gap: 20px;">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" placeholder="ejemplo@gamer.com" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="options-row">
          <label class="remember-me">
            <input type="checkbox" name="remember">
            <span>Recordarme</span>
          </label>
          <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="submit-btn">Ingresar al Universo</button>
      </form>

      <div class="register-prompt">
        ¿No tienes una cuenta? <a href="#">Regístrate aquí</a>
      </div>

      <hr style="border: 0; border-top: 1px solid var(--line); margin: 4px 0;">

      <a href="../../index.html" class="back-link">← Volver al Catálogo</a>
    </main>
  </div>
</body>
</html>
